<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trade History — Jacob's Money Farm</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --surface: #0f1520; --border: #1a2035;
      --green: #4ade80; --green-dim: rgba(74,222,128,0.12); --green-border: rgba(74,222,128,0.2);
      --red: #f87171; --amber: #fbbf24;
      --text: #e2e8f0; --muted: #475569; --dim: #1e293b;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--border); }

    .header {
      background: rgba(8,12,20,0.97);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px);
    }
    .header-brand { display: flex; align-items: center; gap: 14px; }
    .lizard-box {
      background: var(--green-dim); border: 1px solid var(--green-border);
      border-radius: 10px; padding: 6px 10px;
      box-shadow: 0 0 16px rgba(74,222,128,0.1);
      font-family: 'DM Mono', monospace; font-size: 9px; line-height: 1.25;
      color: var(--green); text-shadow: 0 0 8px rgba(74,222,128,0.6);
      white-space: pre; user-select: none; letter-spacing: 0.05em;
    }
    .brand-title {
      font-size: 17px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(90deg, #4ade80, #22c55e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      font-size: 12px; font-family: 'DM Mono', monospace; font-weight: 600;
      color: var(--muted); text-decoration: none;
      padding: 7px 18px; border-radius: 8px;
      border: 1px solid var(--border); transition: all 0.15s;
    }
    .nav-links a:hover { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
    .nav-links a.active { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }

    .main { max-width: 1100px; margin: 0 auto; padding: 24px 24px 60px; }

    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 16px; }
    .stat-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
    .stat-value.green { color: var(--green); }

    .controls { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .search {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 9px 14px;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
      outline: none; transition: border 0.15s;
    }
    .search:focus { border-color: var(--green-border); }
    .search::placeholder { color: var(--muted); }
    .filter-btn {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
      padding: 8px 14px; border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.07);
      background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active { background: var(--green-dim); color: var(--green); border-color: var(--green-border); }
    .filter-btn:hover:not(.active) { color: var(--text); border-color: var(--dim); }
    .count-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

    .day-group { margin-bottom: 28px; animation: fadeIn 0.3s ease both; }
    .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .day-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .day-stats { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .day-line { flex: 1; height: 1px; background: rgba(255,255,255,0.05); }

    .table-wrap { background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.055); border-radius: 12px; overflow: hidden; }
    .table-header { display: grid; grid-template-columns: 1fr 70px 65px 65px 65px 65px 130px; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); }
    .th { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .trade-row { display: grid; grid-template-columns: 1fr 70px 65px 65px 65px 65px 130px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; cursor: pointer; }
    .trade-row:last-child { border-bottom: none; }
    .trade-row:hover { background: rgba(255,255,255,0.025); }
    .trade-row.exit-row { opacity: 0.6; }
    .q-main { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
    .q-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
    .cell { display: flex; align-items: center; font-family: 'DM Mono', monospace; font-size: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; }
    .badge-yes { background: rgba(74,222,128,0.12); color: var(--green); }
    .badge-no { background: rgba(248,113,113,0.12); color: var(--red); }
    .badge-exit { background: rgba(99,102,241,0.12); color: #818cf8; }
    .conf-high { color: var(--green); } .conf-medium { color: var(--amber); } .conf-low { color: var(--muted); }
    .edge-bar-wrap { display: flex; align-items: center; gap: 6px; }
    .edge-bar-bg { flex: 1; height: 3px; background: var(--dim); border-radius: 2px; max-width: 50px; }
    .edge-bar-fill { height: 100%; border-radius: 2px; }
    .expand-row { padding: 10px 16px 14px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.04); display: none; }
    .expand-row.open { display: block; }
    .reasoning { font-size: 12px; color: var(--muted); line-height: 1.6; font-style: italic; border-left: 2px solid var(--green-border); padding-left: 10px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<script>
(async function() {
  try {
    const res = await fetch('/api/auth/check', {credentials: 'include'});
    const data = await res.json();
    if (!data.ok) window.location.href = '/login.html';
  } catch(e) { window.location.href = '/login.html'; }
})();
</script>
<div class="header">
  <div class="header-brand">
    <div class="lizard-box">  /\_/\  &#10; ( o.o ) &#10;  &gt; ^ &lt;  &#10; /|   |\</div>
    <div>
      <div class="brand-title">Jacob's Money Farm</div>
      <div class="brand-sub">Trade History</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="polymarket_dashboard.html">Dashboard</a>
    <a href="history.html" class="active">History</a>
    <a href="performance.html">Performance</a>
  </div>
</div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total Trades</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Entries</div><div class="stat-value" id="s-entries">—</div></div>
    <div class="stat"><div class="stat-label">Exits</div><div class="stat-value" id="s-exits">—</div></div>
    <div class="stat"><div class="stat-label">High Confidence</div><div class="stat-value green" id="s-high">—</div></div>
    <div class="stat"><div class="stat-label">Capital Deployed</div><div class="stat-value" id="s-capital">—</div></div>
  </div>
  <div class="controls">
    <input class="search" id="search" placeholder="Search markets..." oninput="render()"/>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('entry',this)">Entries</button>
    <button class="filter-btn" onclick="setFilter('exit',this)">Exits</button>
    <button class="filter-btn" onclick="setFilter('high',this)">High Conf</button>
    <button class="filter-btn" onclick="setFilter('yes',this)">YES</button>
    <button class="filter-btn" onclick="setFilter('no',this)">NO</button>
    <span class="count-badge" id="count-badge"></span>
  </div>
  <div id="content"></div>
</div>
<script>
let allTrades = [], currentFilter = 'all';

function parseCSV(text) {
  const r = Papa.parse(text, { header: true, skipEmptyLines: true });
  return r.data.map((row, i) => ({
    id: i,
    timestamp: new Date(row.timestamp),
    question: (row.market_question || '').trim(),
    side: (row.side || 'YES').replace('EXIT-',''),
    isExit: (row.side||'').startsWith('EXIT-') || row.order_status==='EXIT',
    marketPrice: parseFloat(row.market_price)||0,
    aiEstimate: parseFloat(row.ai_estimate)||0,
    edge: parseFloat(row.edge)||0,
    size: parseFloat(row.size)||0,
    confidence: row.confidence||'low',
    reasoning: row.reasoning||'',
    dryRun: row.dry_run==='True',
  })).filter(r => r.size > 0 && r.question);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return allTrades.filter(t => {
    if (q && !t.question.toLowerCase().includes(q)) return false;
    if (currentFilter==='entry') return !t.isExit;
    if (currentFilter==='exit') return t.isExit;
    if (currentFilter==='high') return t.confidence==='high';
    if (currentFilter==='yes') return t.side==='YES' && !t.isExit;
    if (currentFilter==='no') return t.side==='NO' && !t.isExit;
    return true;
  });
}

function ec(edge) { return edge>0.15?'#4ade80':edge>0.05?'#fbbf24':'#f87171'; }

function toggleExpand(id) {
  const el = document.getElementById('expand-'+id);
  if (el) el.classList.toggle('open');
}

function render() {
  const trades = filtered();
  document.getElementById('count-badge').textContent = `${trades.length} trade${trades.length!==1?'s':''}`;
  const content = document.getElementById('content');
  if (!trades.length) { content.innerHTML='<div class="empty">No trades match your filter.</div>'; return; }

  const sorted = [...trades].sort((a,b) => b.timestamp-a.timestamp);
  const groups = {};
  sorted.forEach(t => {
    const day = t.timestamp.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    if (!groups[day]) groups[day]=[];
    groups[day].push(t);
  });

  content.innerHTML = Object.entries(groups).map(([day, dt]) => {
    const entries = dt.filter(t=>!t.isExit);
    const exits = dt.filter(t=>t.isExit);
    const capital = entries.reduce((s,t)=>s+t.size,0);
    const rows = dt.map(t => {
      const pct = Math.min(Math.abs(t.edge)*100,100);
      const col = ec(t.edge);
      const sc = t.isExit?'badge-exit':t.side==='YES'?'badge-yes':'badge-no';
      const sl = t.isExit?'EXIT':t.side;
      const time = t.timestamp.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      return `
        <div class="trade-row ${t.isExit?'exit-row':''}" onclick="toggleExpand(${t.id})">
          <div class="cell"><div><div class="q-main">${t.question.slice(0,72)}${t.question.length>72?'…':''}</div><div class="q-time">${time}${t.dryRun?' · DRY':' · LIVE'}</div></div></div>
          <div class="cell"><span class="badge ${sc}">${sl}</span></div>
          <div class="cell">$${t.size.toFixed(2)}</div>
          <div class="cell">${(t.marketPrice*100).toFixed(1)}%</div>
          <div class="cell">${t.aiEstimate?(t.aiEstimate*100).toFixed(1)+'%':'—'}</div>
          <div class="cell conf-${t.confidence}" style="font-size:11px">${t.confidence}</div>
          <div class="cell"><div class="edge-bar-wrap"><div class="edge-bar-bg"><div class="edge-bar-fill" style="width:${pct}%;background:${col}"></div></div><span style="font-size:11px;color:${col};min-width:38px">${t.edge>0?'+':''}${(t.edge*100).toFixed(1)}%</span></div></div>
        </div>
        ${t.reasoning?`<div class="expand-row" id="expand-${t.id}"><div class="reasoning">${t.reasoning}</div></div>`:''}`;
    }).join('');
    return `<div class="day-group">
      <div class="day-header"><span class="day-label">${day}</span><span class="day-stats">${entries.length} entr${entries.length!==1?'ies':'y'} · ${exits.length} exit${exits.length!==1?'s':''} · $${capital.toFixed(2)} deployed</span><div class="day-line"></div></div>
      <div class="table-wrap"><div class="table-header"><div class="th">Market</div><div class="th">Side</div><div class="th">Size</div><div class="th">Mkt %</div><div class="th">AI %</div><div class="th">Conf</div><div class="th">Edge</div></div>${rows}</div>
    </div>`;
  }).join('');
}

function updateStats() {
  const entries = allTrades.filter(t=>!t.isExit);
  const exits = allTrades.filter(t=>t.isExit);
  const high = allTrades.filter(t=>t.confidence==='high');
  const capital = entries.reduce((s,t)=>s+t.size,0);
  const days = new Set(allTrades.map(t=>t.timestamp.toDateString())).size;
  document.getElementById('s-total').textContent = allTrades.length;
  document.getElementById('s-entries').textContent = entries.length;
  document.getElementById('s-exits').textContent = exits.length;
  document.getElementById('s-high').textContent = high.length;
  document.getElementById('s-capital').textContent = '$'+capital.toFixed(2);
}

fetch('trades.csv?t='+Date.now())
  .then(r=>{ if(!r.ok) throw new Error(); return r.text(); })
  .then(text=>{ allTrades=parseCSV(text); updateStats(); render(); })
  .catch(()=>{ document.getElementById('content').innerHTML='<div class="empty">trades.csv not found — run the bot first</div>'; });
</script>
</body>
</html>
