async function deploy(filename, b64content) {
  const token = document.getElementById('token').value.trim();
  const log = document.getElementById('log');
  const repo = 'schmittjacob1123/money-farm-bots';
  
  log.innerHTML = `Deploying ${filename}...\n`;

  try {
    // Get current file SHA (needed for update)
    log.innerHTML += 'Fetching current file SHA...\n';
    const getResp = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    const getData = await getResp.json();
    const sha = getData.sha;
    log.innerHTML += `Got SHA: ${sha.substring(0,7)}...\n`;

    // Push new content
    log.innerHTML += 'Pushing new content to GitHub...\n';
    const putResp = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `deploy: ${filename} via Claude`,
        content: b64content,
        sha: sha,
        branch: 'main'
      })
    });
    const putData = await putResp.json();
    
    if (putResp.ok) {
      log.innerHTML += `<span class="ok">✅ Pushed! Commit: ${putData.commit.sha.substring(0,7)}\nServer will auto-deploy within 30 seconds.</span>\n`;
    } else {
      log.innerHTML += `<span class="err">❌ Error: ${JSON.stringify(putData)}</span>\n`;
    }
  } catch(e) {
    log.innerHTML += `<span class="err">❌ ${e.message}</span>\n`;
  }
}
</script>
